<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastrar Jogador | Joker Tournament</title>

    <link rel="stylesheet" href="/joker-tournament/assets/front/css/CadastrarJogador.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    >

</head>

<body>

    <aside class="sidebar">

        <div class="logo-area">

            <img
                src="/joker-tournament/assets/img/logo joker tournament.png"
                alt="Joker Tournament"
            >

            <h2>JOKER</h2>
            <span>Tournament</span>

        </div>

        <nav>

            <a href="index.html">
                <i class="fa-solid fa-house"></i>
                Dashboard
            </a>

            <a href="#">
                <i class="fa-solid fa-trophy"></i>
                Torneios
            </a>

            <a href="#">
                <i class="fa-solid fa-users"></i>
                Jogadores
            </a>

            <a href="CriaTorneio.html">
                <i class="fa-solid fa-square-plus"></i>
                Cadastrar Torneio
            </a>

            <a href="#" class="active">
                <i class="fa-solid fa-user-plus"></i>
                Cadastrar Jogador
            </a>

        </nav>

        <div class="logout">

            <a href="#">
                <i class="fa-solid fa-right-from-bracket"></i>
                Sair
            </a>

        </div>

    </aside>

    <main class="content">

        <div class="header">

            <h1>Cadastrar Jogador</h1>

            <p>
                Adicione um novo participante
            </p>

        </div>

        <div class="card">

            <form>

                <div class="campo">

                    <label>Nome Completo</label>

                    <input
                        type="text"
                        placeholder="Digite o nome do jogador"
                    >

                </div>

                <div class="campo">

                    <label>Apelido</label>

                    <input
                        type="text"
                        placeholder="Opcional"
                    >

                </div>

                <div class="campo">

                    <label>Telefone</label>

                    <input
                        type="tel"
                        placeholder="(00) 00000-0000"
                    >

                </div>

                <button type="submit">
                    Cadastrar Jogador
                </button>

            </form>

        </div>

    </main>

</body>
</html>
