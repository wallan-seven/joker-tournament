<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joker Tournament - Login</title>
    <link rel="stylesheet" href="/joker-tournament/assets/front/css/login.css">
</head>
<body>

    <div class="login-container">

        <img src="/joker-tournament/assets/img/logo joker tournament.png" alt="Joker Tournament" class="logo">

        <h1>Painel Administrativo</h1>
        <p>Acesso restrito à administração.</p>

        <form>
            <div class="input-group">
                <label for="usuario">Usuário</label>
                <input
                    type="text"
                    id="usuario"
                    placeholder="Digite seu usuário"
                    required
                >
            </div>

            <div class="input-group">
                <label for="senha">Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    required
                >
            </div>

            <form action="/joker-tournament/assets/front/pages/index.html">

                <button type="submit">
                    Entrar
                </button>

            </form>
        </form>

    </div>

</body>
</html>
